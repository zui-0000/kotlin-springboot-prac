# ==========================================================================
# コミットメッセージ規約（committed）
# 形式: <type>(<scope 任意>): <説明>
#   例: feat: メッセージ一覧APIを追加
#       feat(message): 一覧を追加
#       fix: 起動時のNPEを修正
# ※ 全ルールを明示的に指定している（暗黙のデフォルトに頼らない）。
# ==========================================================================

# Conventional Commits 形式を強制する（type: の付いていないメッセージは弾く）
style = "conventional"

# --- 許可する type（拡張11種） ---
allowed_types = [
    "feat",     # 新機能
    "fix",      # バグ修正
    "docs",     # ドキュメントのみ
    "style",    # 整形（振る舞いに影響しない変更）
    "refactor", # リファクタ（機能変更なし）
    "perf",     # 性能改善
    "test",     # テストの追加・修正
    "chore",    # 雑務（その他）
    "build",    # ビルド・依存関係
    "ci",       # CI 設定
    "revert",   # 変更の取り消し
]

# --- scope（type の後の括弧）: 自由 ---
# 空 = スコープは任意（付けても付けなくてもよい）かつ名前は自由。
allowed_scopes = []

# --- 文字数制限: 無し ---
# 日本語(CJK)は文字幅で長さ判定が揺れて誤検知しやすいため、いずれも無効化。
subject_length = 0      # 1行目（subject）の長さ制限なし
line_length = 0         # 本文の1行の長さ制限なし
hard_line_length = 0    # 本文の厳格な行長制限なし

# --- 日本語向けに無効化する英語前提のチェック ---
subject_capitalized = false   # 先頭大文字（日本語に大文字は無い）
imperative_subject = false    # 命令形（英語の動詞前提のため）

# --- その他の品質ルール（有効） ---
subject_not_punctuated = true # subject の末尾に句読点を付けない（タイトルとして扱う）
                              # ※ 検出は ASCII の句読点(. ! ? 等)のみ。全角(。！)は committed が検出しない

no_fixup = true               # "fixup!" コミットを禁止（squash 前提のため push させない）
no_wip = true                 # "WIP" コミットを禁止
merge_commit = true           # マージコミットは規約チェックの対象外にする
