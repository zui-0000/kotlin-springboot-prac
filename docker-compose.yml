# ローカル開発用の PostgreSQL。
# 起動: docker compose up -d
# 停止: docker compose down       （データは残る）
# 全消し: docker compose down -v   （ボリュームごと削除）
services:
  db:
    image: postgres:17
    container_name: prac-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # DB が接続を受け付けられるまで待てるようにする
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
