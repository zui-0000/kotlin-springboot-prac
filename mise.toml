# mise: リポジトリ全体のツールとタスク。
# ※ backend（Kotlin/Spring）のツール・タスクは backend/mise.toml を参照。
#    backend の操作は backend/ 内で `mise run <名前>` を実行する。
# セットアップ: ルートで `mise install`（lefthook/committed）。
#              backend/ でも `mise install` すると java/gradle も入る。

[tools]
# Git フックマネージャ（Go製・言語非依存）
lefthook = "2.1.9"
# コミットメッセージの規約チェック（Rust製・Conventional Commits）
committed = "1.1.11"

[tasks.hooks-install]
description = "Git フック（lefthook）を有効化する（clone 後に1回だけ実行）"
run = "lefthook install"
