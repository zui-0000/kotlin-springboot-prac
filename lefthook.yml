# Git フック設定（lefthook）
# 有効化: mise exec -- lefthook install（初回のみ）
# 手動実行: mise exec -- lefthook run pre-commit

# コミット前: 変更内容に応じてチェック
pre-commit:
  commands:
    # Kotlin ファイルに変更があれば ktlint でチェック
    ktlint:
      glob: "*.{kt,kts}"
      run: mise run lint
    # OpenAPI 定義に変更があれば妥当性を検証
    openapi-validate:
      glob: "schema/*.{yaml,yml}"
      run: mise run schema-validate

# コミットメッセージ: Conventional Commits 規約に沿っているか committed で検証
commit-msg:
  commands:
    committed:
      run: committed --commit-file {1}
