spring:
  application:
    name: kotlin-springboot-prac

  # DB 接続設定（環境変数を優先し、無ければローカルのデフォルト値を使う）
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:prac}
    username: ${POSTGRES_USER:prac}
    password: ${POSTGRES_PASSWORD:pracpass}

  # Exposed (ORM) の設定
  exposed:
    # スキーマは Flyway が管理するため、Exposed の自動テーブル生成は無効化する
    generate-ddl: false

  flyway:
    enabled: true
    # マイグレーションファイルの置き場所（デフォルト）
    locations: classpath:db/migration
    # タイムスタンプ方式のため有効化。
    # 並行開発で「後から古い時刻のマイグレーション」がマージされても適用を許す。
    out-of-order: true
