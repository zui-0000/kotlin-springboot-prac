openapi: 3.0.3
info:
  title: kotlin-springboot-prac API
  description: 学習用プロジェクトの API 契約（スキーマ駆動・contract-first）
  version: 0.0.1

servers:
  - url: http://localhost:8080
    description: ローカル開発

# paths は各機能の path item を $ref で束ねるだけ（機能の詳細は refs/<feature>/ に閉じる）。
# タグの description メタデータ(root tags)は生成に影響しないため置かない。必要になれば root に足す。
paths:
  /messages:
    $ref: "./refs/messages/paths.yaml#/collection"
  /messages/{id}:
    $ref: "./refs/messages/paths.yaml#/member"
