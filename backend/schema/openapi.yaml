openapi: 3.0.3
info:
  title: kotlin-springboot-prac API
  description: 学習用プロジェクトの API 契約（スキーマ駆動・contract-first）
  version: 0.0.1

servers:
  - url: http://localhost:8080
    description: ローカル開発

paths:
  /messages:
    get:
      operationId: listMessages
      summary: メッセージ一覧を取得する
      tags: [messages]
      responses:
        "200":
          description: メッセージの一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: createMessage
      summary: メッセージを登録する
      tags: [messages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "200":
          description: 登録されたメッセージ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

components:
  schemas:
    Message:
      type: object
      required: [id, content, createdAt]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        content:
          type: string
          example: "こんにちは"
        createdAt:
          type: string
          format: date-time
    CreateMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          example: "こんにちは"
