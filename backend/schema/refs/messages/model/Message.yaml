type: object
required: [id, userId, content, createdAt, updatedAt]
properties:
  id:
    type: string
    format: uuid
    example: "0198f7a2-1b2c-7000-8000-000000000000"
  userId:
    type: string
    format: uuid
    example: "0198f7a2-1b2c-7000-8000-000000000001"
  content:
    type: string
    example: "こんにちは"
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
